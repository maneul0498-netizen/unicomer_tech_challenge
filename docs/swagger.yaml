basePath: /api/v1/
definitions:
  http.ErrorResponse:
    properties:
      code:
        example: 404
        type: integer
      message:
        example: wallet not found
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: Tech Challenge
  title: Unicomer tech challenge
  version: "1.0"
paths:
  /holidays:
    get:
      parameters:
      - description: fromDate (YYYY-MM-DD)
        in: query
        name: fromDate
        required: true
        type: string
      - description: toDate (YYYY-MM-DD)
        in: query
        name: toDate
        required: true
        type: string
      - description: holiday type
        in: query
        name: type
        type: string
      - description: application/json or application/xml
        in: header
        name: Accept
        type: string
      produces:
      - application/json
      - text/xml
      responses:
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.ErrorResponse'
      summary: Get
      tags:
      - HolyDays
swagger: "2.0"
